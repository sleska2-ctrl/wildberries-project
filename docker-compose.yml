services:
  wb-sync-web:
    build:
      context: .
    container_name: wb-sync-web
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      WEB_APP_HOST: 127.0.0.1
      WEB_APP_PORT: "8765"
    volumes:
      - ./data:/app/data
      - ./secrets:/run/secrets:ro

  caddy:
    image: caddy:2-alpine
    container_name: wb-sync-caddy
    restart: unless-stopped
    network_mode: host
    depends_on:
      - wb-sync-web
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
