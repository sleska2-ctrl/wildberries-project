services:
  wb-sync-web:
    build:
      context: .
    container_name: wb-sync-web
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      WEB_APP_HOST: 0.0.0.0
      WEB_APP_PORT: "${WEB_PUBLIC_PORT:-80}"
    volumes:
      - ./data:/app/data
      - ./secrets:/run/secrets:ro
